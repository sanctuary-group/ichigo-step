# ホスト nginx サイト設定テンプレート（VPS の /etc/nginx/sites-available/ に配置）
#
#   sudo cp docker/host-nginx/message.one-step-studio.jp.conf \
#           /etc/nginx/sites-available/message.one-step-studio.jp
#   sudo ln -s /etc/nginx/sites-available/message.one-step-studio.jp \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d message.one-step-studio.jp   # ← SSL 行は certbot が自動追記
#
# 下記は certbot 実行前の HTTP のみの状態。certbot 実行後に 443 / 証明書行が追加される。

server {
    listen 80;
    listen [::]:80;
    server_name message.one-step-studio.jp;

    # アップロード上限（コンテナ nginx / PHP と合わせる）
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }
}

