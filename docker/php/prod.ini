; 本番用 PHP 設定（dev の上書き）
; docker-compose.prod.yml で conf.d にマウントされる

; --- OPcache（本番は timestamps 検証を切って高速化）---
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
; 0 = コード変更はコンテナ再起動で反映（デプロイ手順で restart する）
opcache.validate_timestamps=0

; --- 一般 ---
expose_php=0
memory_limit=256M
max_execution_time=60

; --- アップロード上限（nginx の client_max_body_size と合わせる）---
upload_max_filesize=25M
post_max_size=25M
